<!DOCTYPE html>

<style>

@font-face{font-family:'Baton';src:url('Baton-MediumItalic.otf') format('opentype');font-weight:500;font-style:italic;}
@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');
:root{--candy:#F3DAD3;--harvest:#C19965;--bark:#3D2E1E;--bark-mid:#6B4F3A;--muted:#8A7B6E;--cream:#FBF6EE;--serif:'P22Mackinac',Georgia,serif;--display:'Baton',Georgia,serif;--sans:'Jost',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow-x:hidden;font-family:var(--sans);font-weight:300;background:var(--candy);color:var(--bark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.logo{font-family:var(--serif);font-size:1rem;letter-spacing:0.12em;color:var(--bark);margin-bottom:3rem;opacity:0.6;}
.num{font-family:var(--serif);font-size:clamp(5rem,15vw,9rem);font-weight:400;color:var(--bark);opacity:0.12;line-height:1;margin-bottom:1rem;}
h1{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.4rem);font-weight:400;color:var(--bark);margin-bottom:0.8rem;}
h1 em{font-style:italic;font-family:var(--display);color:var(--harvest);}
p{font-size:0.93rem;color:var(--bark-mid);font-weight:300;line-height:1.85;max-width:440px;margin:0 auto 2.5rem;}
.links{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.btn{display:inline-block;padding:0.85rem 2rem;font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:500;font-family:var(--sans);transition:all 0.3s;text-decoration:none;}
.btn-primary{background:var(--harvest);color:var(--cream);}
.btn-primary:hover{background:var(--bark-mid);}
.btn-outline{border:1.5px solid var(--harvest);color:var(--bark);}
.btn-outline:hover{background:var(--harvest);color:var(--cream);}
</style>
</head>
